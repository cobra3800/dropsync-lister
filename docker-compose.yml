services:
  postgres:
    image: postgres:16
    container_name: dropsync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dropsync
      POSTGRES_PASSWORD: dropsync
      POSTGRES_DB: dropsync_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: dropsync-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
volumes:
  postgres_data:
